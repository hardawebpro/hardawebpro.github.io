				}
			}, {
				"@type": "Question",

				}

				"name": "Apakah tersedia komponen atau aksesori timbangan?",

					"text": "Indikator timbangan, load cell, kabel, dan aksesori pendukung dapat menjadi bagian dari kebutuhan unit. Ketersediaan komponen bergantung pada jenis produk dan spesifikasi yang dipilih, sehingga perlu dikonfirmasi sebelum pemesanan."
				}
